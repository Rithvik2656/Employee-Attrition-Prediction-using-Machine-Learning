<!DOCTYPE html>
<html>
<head>
    <title>Prediction</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body class="bg-image">

<!-- NAVBAR -->
<div class="navbar">
    <h2>AttritionAI</h2>
    <div>
        <a href="/">Home</a>
        <a href="/prediction" class="active">Prediction</a>
    </div>
</div>

<!-- GLASS FORM -->
<div class="glass-container">
    <h2>Employee Profile</h2>

    <form action="/predict" method="post">
        <input type="number" name="age" placeholder="Age" required>
        <input type="number" name="income" placeholder="Monthly Income" required>

        <select name="satisfaction">
            <option value="">Job Satisfaction</option>
            <option value="1">Low</option>
            <option value="2">Medium</option>
            <option value="3">High</option>
            <option value="4">Very High</option>
        </select>

        <input type="number" name="years" placeholder="Years at Company" required>

        <select name="overtime">
            <option value="">Overtime</option>
            <option value="0">No</option>
            <option value="1">Yes</option>
        </select>

        <button type="submit">Predict Attrition</button>
    </form>

    {% if result %}
        <h3 class="result">{{ result }}</h3>
    {% endif %}
</div>

</body>
</html>
